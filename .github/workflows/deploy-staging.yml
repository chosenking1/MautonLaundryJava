name: Deploy Staging Backend

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/imototo/MautonLaundryJava
            git fetch origin
            git checkout staging
            git reset --hard origin/staging
            docker stop imototo-backend-staging || true
            docker rm imototo-backend-staging || true
            docker build --pull --no-cache -t imototo-backend-staging .
            docker run -d \
              --name imototo-backend-staging \
              --restart always \
              --network host \
              --env-file /opt/imototo/MautonLaundryJava/.env.staging \
              imototo-backend-staging

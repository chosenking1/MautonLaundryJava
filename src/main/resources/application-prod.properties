# Production Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.security=WARN

# JWT Configuration
app.jwt-secret=${JWT_SECRET}
app.jwt-expiration-milliseconds=3600000

# Public base URL for emails in prod
app.base-url=${PUBLIC_BASE_URL}

# Security
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# Redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# Admin notifications
app.admin.team-email=${ADMIN_TEAM_EMAIL}
app.dispatch.retry-delay-seconds=${DISPATCH_RETRY_DELAY_SECONDS:120}
app.dispatch.job-ttl-seconds=${DISPATCH_JOB_TTL_SECONDS:3600}

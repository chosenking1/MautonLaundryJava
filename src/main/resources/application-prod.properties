# Production Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.security=INFO

# JWT Configuration
app.jwt-secret=${JWT_SECRET}
app.jwt-expiration-milliseconds=604800000

# Public base URL for emails in prod
app.base-url=${PUBLIC_BASE_URL}

# CORS origins for production — REQUIRED, no default. Set to your production domain(s), e.g. https://app.imototo.com
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS}

# File upload directory — REQUIRED. Must be an absolute path writable by the app user, e.g. /var/imototo/uploads
app.upload.dir=${UPLOAD_DIR}

# Security
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Disable OpenAPI/Swagger in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Restrict actuator endpoints in production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=false

# Admin notifications
app.admin.team-email=${ADMIN_TEAM_EMAIL}

# Dispatch configuration
app.dispatch.retry-delay-seconds=${DISPATCH_RETRY_DELAY_SECONDS:120}
app.dispatch.job-ttl-seconds=${DISPATCH_JOB_TTL_SECONDS:3600}

# Assignment lifecycle tuning
app.assignment.laundry.acceptance-ttl-minutes=60
app.assignment.laundry.max-active-load=10
app.assignment.scheduler.fixed-delay-ms=60000

# Security settings - enable SSL in production
spring.security.require-ssl=true
server.forward-headers-strategy=framework

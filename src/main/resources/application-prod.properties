# Production Configuration
spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.security=INFO

# Public app and frontend URLs
app.base-url=${PUBLIC_BASE_URL}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS}

# JWT Configuration
app.jwt-secret=${JWT_SECRET}
app.jwt-expiration-milliseconds=604800000

# Mail Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.default-encoding=UTF-8

# Payment Gateway Configuration
payments.gateway.monnify.base-url=${MONNIFY_BASE_URL}
payments.gateway.monnify.public-key=${MONNIFY_PUBLIC_KEY}
payments.gateway.monnify.secret-key=${MONNIFY_SECRET_KEY}
payments.gateway.monnify.contract-code=${MONNIFY_CONTRACT_CODE}
payments.gateway.monnify.merchant-id=${MONNIFY_MERCHANT_ID}
payments.gateway.monnify.webhook-secret=${MONNIFY_WEBHOOK_SECRET:}

payments.gateway.squad.base-url=${SQUAD_BASE_URL}
payments.gateway.squad.public-key=${SQUAD_PUBLIC_KEY}
payments.gateway.squad.secret-key=${SQUAD_SECRET_KEY}
payments.gateway.squad.merchant-id=${SQUAD_MERCHANT_ID:}
payments.gateway.squad.contract-code=${SQUAD_CONTRACT_CODE:}
payments.gateway.squad.webhook-secret=${SQUAD_WEBHOOK_SECRET:}

payments.gateway.paystack.base-url=${PAYSTACK_BASE_URL:https://api.paystack.co}
payments.gateway.paystack.public-key=${PAYSTACK_PUBLIC_KEY}
payments.gateway.paystack.secret-key=${PAYSTACK_SECRET_KEY}
payments.gateway.paystack.merchant-id=${PAYSTACK_MERCHANT_ID:}
payments.gateway.paystack.contract-code=${PAYSTACK_CONTRACT_CODE:}
payments.gateway.paystack.webhook-secret=${PAYSTACK_WEBHOOK_SECRET:}

# File upload directory
app.upload.dir=${UPLOAD_DIR}

# Security
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Disable OpenAPI/Swagger in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Restrict actuator endpoints in production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=false

# Assignment lifecycle tuning
app.assignment.laundry.acceptance-ttl-minutes=60
app.assignment.laundry.max-active-load=10
app.assignment.scheduler.fixed-delay-ms=60000
app.dispatch.retry-delay-seconds=${DISPATCH_RETRY_DELAY_SECONDS:120}
app.dispatch.job-ttl-seconds=${DISPATCH_JOB_TTL_SECONDS:3600}

# Admin notifications
app.admin.team-email=${ADMIN_TEAM_EMAIL}

# Security settings - enable SSL in production
spring.security.require-ssl=true
server.forward-headers-strategy=framework

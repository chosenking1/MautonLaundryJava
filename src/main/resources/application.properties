# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Application Info
info.app.name=MautonLaundry
info.app.description=Laundry Service Management System
info.app.version=@project.version@


# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Pickup scheduling policy
# NORMAL bookings: number of days after booking/payment time
app.pickup.standard.lead-days=1
# Allow same-day pickup for NORMAL bookings when booked/paid before cutoff
app.pickup.same-day-enabled=false
# Cutoff applies to both NORMAL and EXPRESS same-day logic
app.pickup.cutoff-time=14:00

# Assignment lifecycle defaults
app.assignment.laundry.acceptance-ttl-minutes=60
app.assignment.laundry.max-active-load=10
app.assignment.scheduler.fixed-delay-ms=60000

# Redis Configuration

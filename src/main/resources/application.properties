# Default Profile
spring.profiles.active=dev
server.port=8079

# Application Configuration
app.base-url=${PUBLIC_BASE_URL:http://localhost:8079}
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2MB

# Database Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/imototo}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.bytecode.provider=bytebuddy
spring.jpa.properties.hibernate.bytecode.use_reflection_optimizer=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Application Info
info.app.name=Imototo Clean
info.app.description=Laundry Service Management System
info.app.version=@project.version@


# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Pickup scheduling policy
# NORMAL bookings: number of days after booking/payment time
app.pickup.standard.lead-days=1
# Allow same-day pickup for NORMAL bookings when booked/paid before cutoff
app.pickup.same-day-enabled=false
# Cutoff applies to both NORMAL and EXPRESS same-day logic
app.pickup.cutoff-time=14:00

# Assignment lifecycle defaults
app.assignment.laundry.acceptance-ttl-minutes=60
app.assignment.laundry.max-active-load=10
app.assignment.scheduler.fixed-delay-ms=60000
app.dispatch.retry-delay-seconds=120
app.dispatch.job-ttl-seconds=3600

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.default-encoding=UTF-8

# App mail settings
app.mail.from=no-reply@Imototo.com
app.mail.from-name=Imototo Clean
app.admin.team-email=${ADMIN_TEAM_EMAIL:admin@imototo.com}

# Token Configuration
app.token.verification.expiry-hours=24
app.token.password-reset.expiry-hours=1

# JWT Configuration
app.jwt-secret=${JWT_SECRET}
app.jwt-expiration-milliseconds=604800000

# Bootstrap admin user is created only when both values are supplied.
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
